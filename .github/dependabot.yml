# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
    ignore:
      # MassTransit v9+ is commercially licensed; stay on the Apache 2.0 8.x line
      - dependency-name: "MassTransit*"
        update-types: ["version-update:semver-major"]
    # With Central Package Management, family packages must move in lockstep,
    # which made ungrouped Dependabot open individual PRs and then supersede
    # them with ad-hoc "multi" PRs. One catch-all group for routine updates;
    # majors stay individual so breaking changes get their own PR.
    groups:
      nuget:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
    groups:
      actions:
        patterns:
          - "*"
